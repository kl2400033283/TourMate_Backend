# ==============================================================
# PROJECT CONFIGURATION
# ==============================================================
spring.application.name=TourMate
server.port=${PORT:8080}

# ==============================================================
# DATABASE CONFIGURATION (MySQL)
# ==============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/YOUR_DB_NAME
# spring.datasource.username=root
# spring.datasource.password=YOUR_PASSWORD
# spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================
# JWT SECURITY CONFIGURATION
# ==============================================================
# Ensure this key is long enough for HS256 (32+ characters)
jwt.secret=YOUR_JWT_SECERET
jwt.expirationMs=YOUR_JWT_EXPIRATIONMS

# ==============================================================
# EMAIL SERVICE (Gmail SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_MAIL@gmail.com
spring.mail.password=YOUR_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# GOOGLE OAUTH2 (Verified from Screenshot)
# ==============================================================
# Note: Fixed the missing 'j' in 'pjravo' to match your cloud console
spring.security.oauth2.client.registration.google.client-id=YOUR_client_id
spring.security.oauth2.client.registration.google.client-secret=YOUR_client_secret

# ==============================================================
# CORS & SWAGGER
# ==============================================================
# Allows your React Frontend (5173) to talk to this Backend (8080)
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Swagger / OpenAPI Documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ==============================================================
# LOGGING
# ==============================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO