# ==============================================================
# PROJECT CONFIGURATION
# ==============================================================
spring.application.name=TourMate
server.port=${PORT:8080}

# ================= DATABASE (Neon PostgreSQL) =================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ==============================================================
# JWT SECURITY CONFIGURATION
# ==============================================================
# Ensure this key is long enough for HS256 (32+ characters)
jwt.secret=mysupersecretkeymysupersecretkey123
jwt.expirationMs=3600000
# ==============================================================
# EMAIL SERVICE (Gmail SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_MAIL@gmail.com
spring.mail.password=YOUR_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# GOOGLE OAUTH2 (Verified from Screenshot)
# ==============================================================
# Note: Fixed the missing 'j' in 'pjravo' to match your cloud console
spring.security.oauth2.client.registration.google.client-id=YOUR_client_id
spring.security.oauth2.client.registration.google.client-secret=YOUR_client_secret

# ==============================================================
# CORS & SWAGGER
# ==============================================================
# Allows your React Frontend (5173) to talk to this Backend (8080)
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Swagger / OpenAPI Documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ==============================================================
# LOGGING
# ==============================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO