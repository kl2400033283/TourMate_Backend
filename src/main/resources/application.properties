# ==============================================================
# PROJECT CONFIGURATION
# ==============================================================
spring.application.name=TourMate
server.port=${PORT:8080}

# ==============================================================
# DATABASE CONFIGURATION (MySQL - Railway via ENV)
# ==============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourmatedb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Brahmani@123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================
# JWT SECURITY CONFIGURATION
# ==============================================================
jwt.secret=${JWT_SECRET:local-dev-secret-key-minimum-32-characters}
jwt.expirationMs=86400000

# ==============================================================
# EMAIL SERVICE (Gmail SMTP via ENV)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mandru.brahmani@gmail.com}
spring.mail.password=${MAIL_PASSWORD:qaqiaibhlfdjszji}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# GOOGLE OAUTH2 (via ENV)
# ==============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}

# ==============================================================
# CORS CONFIGURATION
# ==============================================================
spring.mvc.cors.allowed-origins=https://tour-mate-frontend.vercel.app,http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# ==============================================================
# SWAGGER / OPENAPI
# ==============================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ==============================================================
# LOGGING
# ==============================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO